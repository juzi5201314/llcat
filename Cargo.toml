[workspace]
members = ["llcat-parser"]
resolver = "2"

[workspace.package]
edition = "2021"
authors = ["soeur"]

[workspace.dependencies]
anyhow = "1.0.81"
ahash = { version = "0.8.11", features = ["serde"] }
smallvec = { version = "1.13.1", features = ["const_new", "serde"] }
serde = { version = "1.0", features = ["derive"] }
smol_str = { version = "0.2.1", features = ["serde"] }
bumpalo = { version = "3.15.4", features = ["collections", "allocator_api"] }
spin = "0.9.8"